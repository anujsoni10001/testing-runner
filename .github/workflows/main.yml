name: Deploy and Run Python Code

on:
  push:
    branches:
      - main

jobs:
  run-python-script:
    runs-on: [self-hosted, Windows]

    steps:
      # Step 1: Pull the latest code onto your machine
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Install dependencies using Windows CMD syntax to bypass PowerShell policies
      - name: Install Dependencies
        shell: cmd
        run: |
          if exist requirements.txt (
              python -m pip install -r requirements.txt
          )

      # Step 3: Run the script using Windows CMD
      - name: Execute Python App
        shell: cmd
        run: python main.py
