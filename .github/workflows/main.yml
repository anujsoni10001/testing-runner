name: Deploy and Run Python Code

on:
  push:
    branches:
      - main

env:
  # Ensures seamless compliance with the June 2026 GitHub Actions Node upgrade requirements
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-python-script:
    runs-on: [self-hosted, Windows]

    steps:
      # Step 1: Pull the latest code onto your machine
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Install dependencies using your explicit Python 3.14 path
      - name: Install Dependencies
        shell: cmd
        run: |
          if exist requirements.txt (
              "C:\Users\hp\AppData\Local\Programs\Python\Python314\python.exe" -m pip install -r requirements.txt
          )

      # Step 3: Run the script using your explicit Python 3.14 path wrapped in double quotes
      - name: Execute Python App
        shell: cmd
        run: '"C:\Users\hp\AppData\Local\Programs\Python\Python314\python.exe" main.py'
