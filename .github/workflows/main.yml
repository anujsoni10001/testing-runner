name: Deploy and Run Python Code

on:
  push:
    branches:
      - main

jobs:
  run-python-script:
    runs-on: [self-hosted, Windows]

    steps:
      # Step 1: Pull the latest code onto your machine
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Use GitHub's official action to set up Python and add it to the runner PATH
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Change to your preferred Python version (e.g., '3.10', '3.12')

      # Step 3: Install dependencies using Windows CMD
      - name: Install Dependencies
        shell: cmd
        run: |
          if exist requirements.txt (
              python -m pip install -r requirements.txt
          )

      # Step 4: Run your script
      - name: Execute Python App
        shell: cmd
        run: python main.py
