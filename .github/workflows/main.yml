name: Deploy and Run Python Code

on:
  push:
    branches:
      - main

jobs:
  run-python-script:
    runs-on: [self-hosted, Windows]

    steps:
      # Step 1: Pull the latest code onto your machine
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Install dependencies globally on the host machine using PowerShell syntax
      - name: Install Dependencies
        shell: powershell
        run: |
          if (Test-Path requirements.txt) {
              python -m pip install -r requirements.txt
          }

      # Step 3: Run the script globally using Windows python executable
      - name: Execute Python App
        shell: powershell
        run: python main.py
