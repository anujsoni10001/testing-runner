name: Deploy and Run Python Code

on:
  push:
    branches:
      - main

jobs:
  run-python-script:
    runs-on: [self-hosted, python-runner]

    steps:
      # Step 1: Pull the latest code onto your machine
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Install dependencies globally on Windows (cmd)
      - name: Install Dependencies
        shell: cmd
        run: |
          if exist requirements.txt (
              pip install -r requirements.txt
          )

      # Step 3: Run the script globally using Windows Python executable
      - name: Execute Python App
        shell: cmd
        run: python main.py
